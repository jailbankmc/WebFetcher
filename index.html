<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>WebFetcher</title>

<style>
:root{
  --bg:#0b0f14;
  --bg-soft:#111827;
  --panel:rgba(17,24,39,.92);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --line:rgba(255,255,255,.12);
  --accent:#22c55e;
  --radius:20px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Space Grotesk",system-ui,sans-serif;
  background:linear-gradient(160deg,var(--bg),var(--bg-soft));
  color:var(--text);
}
.wrap{max-width:1200px;margin:auto;padding:28px}
.topbar{display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;gap:14px;align-items:center}
.logo{
  width:48px;height:48px;border-radius:14px;
  display:grid;place-items:center;
  background:linear-gradient(135deg,var(--accent),#16a34a);
  font-weight:900;color:#052e16;
}
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:22px;
}
h1{margin:0;font-size:2.2rem}
.muted{color:var(--muted)}
#chat{
  margin-top:20px;
  height:550px;
  overflow:auto;
}
.msg{margin-bottom:20px}
.user{color:var(--accent);font-weight:700}
.ai{color:var(--text)}
.ai img{max-width:100%;border-radius:14px;margin-top:12px}
.source{margin-top:10px;font-size:.9rem;color:var(--muted)}
.source a{color:var(--accent)}
.inputbar{margin-top:18px;display:flex;gap:10px}
input{
  flex:1;padding:14px 18px;border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  color:var(--text)
}
button{
  padding:12px 18px;border-radius:999px;
  border:1px solid var(--line);
  background:var(--panel);color:var(--text);
  cursor:pointer
}

/* Side Button */
.sidebtn{
  position:fixed;right:22px;top:50%;
  transform:translateY(-50%);
  background:linear-gradient(135deg,var(--accent),#16a34a);
  color:#052e16;
  padding:14px 16px;
  border-radius:999px;
  font-weight:900;
  text-decoration:none;
  animation:pulse 2.2s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}
  70%{box-shadow:0 0 0 18px rgba(34,197,94,0)}
  100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}
}
</style>
</head>

<body>
<a class="sidebtn" href="https://jailbankmc.github.io/WebFetcher-MC">WebFetcherMC</a>

<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="logo">🌐</div>
      <div>
        <h1>WebFetcher</h1>
        <div class="muted">Suche Inhalte · Wikipedia · Wikis · Reddit · News... ich weiss das es Google gibt...</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div id="chat"></div>

    <div class="inputbar">
      <input id="q" placeholder="Suchbegriff eingeben …">
      <button onclick="search()">Suchen</button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("q");

async function search(){
  const query = input.value.trim();
  if(!query) return;

  chat.innerHTML += `<div class="msg user">${query}</div>`;
  input.value = "";

  // Speicher für Quellen
  const results = [];

  // 1) Wikipedia
  try{
    const wp = await fetch(
      "https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch="
      + encodeURIComponent(query)
      + "&format=json&origin=*"
    );
    const wpData = await wp.json();
    if(wpData.query.search.length){
      const title = wpData.query.search[0].title;
      const pageRes = await fetch(
        "https://en.wikipedia.org/w/api.php?action=query&prop=extracts|pageimages&explaintext&pithumbsize=700&titles="
        + encodeURIComponent(title)
        + "&format=json&origin=*"
      );
      const pageData = await pageRes.json();
      const obj = Object.values(pageData.query.pages)[0];
      results.push({
        text: obj.extract ? obj.extract.slice(0,1500)+"…" : "Kein Text",
        img: obj.thumbnail ? obj.thumbnail.source : null,
        link: "https://en.wikipedia.org/wiki/"+encodeURIComponent(title),
        source: "Wikipedia"
      });
    }
  }catch(e){}

  // 2) Minecraft Wiki
  try{
    const mw = await fetch(
      "https://minecraft.wiki/api.php?action=query&list=search&srsearch="
      + encodeURIComponent(query)
      + "&format=json&origin=*"
    );
    const mwData = await mw.json();
    if(mwData.query.search.length){
      const title = mwData.query.search[0].title;
      const link = "https://minecraft.wiki/w/"+encodeURIComponent(title.replace(/ /g,"_"));
      results.push({
        text: "Siehe Artikel: "+title,
        img: null,
        link: link,
        source: "Minecraft Wiki"
      });
    }
  }catch(e){}

  // 3) Reddit (verlinken)
  const redditLink = "https://www.reddit.com/search/?q="+encodeURIComponent(query+" minecraft");
  results.push({text:"Reddit Diskussionen", link:redditLink, source:"Reddit", img:null});

  // 4) Offizielle News / Snapshots
  const mcNews = "https://www.minecraft.net/de-de/article?q="+encodeURIComponent(query);
  results.push({text:"Offizielle Minecraft News / Artikel", link:mcNews, source:"Minecraft.net", img:null});

  // Anzeige
  if(results.length===0){
    chat.innerHTML += `<div class="msg ai">Keine Infos gefunden.</div>`;
    return;
  }

  for(const r of results){
    let html = r.text;
    if(r.img) html += `<img src="${r.img}">`;
    html += `<div class="source">Quelle: <a target="_blank" href="${r.link}">${r.source}</a></div>`;
    chat.innerHTML += `<div class="msg ai">${html}</div><hr>`;
  }

  chat.scrollTop = chat.scrollHeight;
}

input.addEventListener("keydown",e=>{
  if(e.key==="Enter") search();
});
</script>
</body>
</html>
